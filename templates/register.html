<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>用户注册</h1>
    <div>
        用户名：<input type="text"/>
    </div>
    <div>
        密码：<input type="password"/>
    </div>


    <div>
        性别：
            <input type="radio">男
            <input type="radio">女
    </div>

    <div>
        爱好：
            <input type="checkbox">篮球
            <input type="checkbox">足球
            <input type="checkbox">乒乓球
    </div>
    
    <div>
        城市：
        <select name="" id="">
            <option value="">北京</option>
            <option value="">上海</option>
            <option value="">深圳</option>
        </select>
    </div>

    <div>
        特长：
            <select multiple name="" id="">
                <option value="">玩游戏</option>
                <option value="">睡觉</option>
                <option value="">吃饭</option>
            </select>
    </div>

    <div>
        备注：<textarea name="" id="" cols="30" rows="5"></textarea>
    </div>


</body>
</html>
